name: Packs cache update

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
      - 'release/**'
    paths:
      - 'pnpm-lock.yaml'

env:
  GITHUB_AUTH_TOKEN: ${{ secrets.PACKAGES_TOKEN }}

jobs:
  create-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install
