syntax = "proto3";

package common.v1;

import "position.proto";

// WinLine contains complete information about a single winning payline combination on the board. 
// It includes the symbol that created the combination, the positions where the symbol appears, 
// the total count of symbols in the combination, and the payout amount for that win.
message WinLine {
    uint32 symbol = 1;
    repeated Position positions = 2;
    int64 occurrences = 3;
    int64 amount = 4;
}

