syntax = "proto3";

package common.v1;

import "common/v1/orthogonal_position.proto";

// EventType describes all possible types of game events.
// It can contain events unique to a particular game.
enum EventType {
  EVENT_TYPE_UNKNOWN_UNSPECIFIED = 0;

  // EVENT_TYPE_GLOBAL_MULTIPLIER_UPDATE during the game randomly increases the value of the global multiplier under certain conditions,
  // depending on the documentation of the game.
  EVENT_TYPE_GLOBAL_MULTIPLIER_UPDATE = 1;

  // EVENT_TYPE_BOOM selects a position on the board and destroys the contents of the 3x3 cells relative to the center.
  // Does not touch wild, scatter and multiplier symbols.
  EVENT_TYPE_BOOM = 2;

  // EVENT_TYPE_SELECTION replaces a random number of symbols on the board with another symbol under certain conditions defined by the game documentation.
  EVENT_TYPE_SELECTION = 3;

  // EVENT_TYPE_LINE destroys a horizontal or vertical line on the game board according to certain conditions described in the game documentation.
  EVENT_TYPE_LINE = 4;

  // EVENT_TYPE_TRANSITION marks a transition between game states, for example entering or leaving a feature mode.
  EVENT_TYPE_TRANSITION = 5;

  // EVENT_TYPE_ANTICIPATION marks an anticipation event before a possible feature trigger.
  EVENT_TYPE_ANTICIPATION = 6;
}

// An event is a structure of a game event.
// Events can be unique for each game and have their own fields.
// If an event occurs during gameplay, information about that event will be reflected in this structure.
message Event {
  // The type of event. Allows you to understand which event occurred by a unique value.
  EventType type = 1;

  // value describes a certain value received during the event.
  optional int32 value = 2;

  // unlocked_cells is a list of previously blocked or locked board positions that have been unlocked as a result of this event.
  // These cells now become available for gameplay interaction.
  repeated common.v1.OrthogonalPosition unlocked_cells = 3;

  // updated_positions is a list of all board positions that were affected or modified by this event.
  // This includes positions where the event was triggered or where visual/state changes occurred.
  repeated common.v1.OrthogonalPosition updated_positions = 4;

  // name is a stable event identifier from the game rules.
  // Use it when the event type is intentionally broad and the frontend needs a specific presentation hook.
  optional string name = 5;

  // target_type describes the category of targets affected or selected by this event.
  // It helps the frontend render grouped targets without inferring intent only from symbols or positions.
  optional string target_type = 6;

  // symbols contains symbol IDs affected or selected by this event.
  // Use it for symbol-scoped events; leave it empty when the event targets positions or another scope.
  repeated uint32 symbols = 7;
}
