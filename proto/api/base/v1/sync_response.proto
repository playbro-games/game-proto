syntax = "proto3";

package api.base.v1;

import "common/v1/gift_spin.proto";
import "common/v1/user.proto";

// API responses for game actions (start, spin, sync, error)
message SyncResponse {
  // user contains the details of the logged-in user, including balance and currency.
  common.v1.User user = 1;

  // gift_spin contains information about any active gift spin offers provided to the player.
  // If this field is populated, it indicates that the player has been given free spins as a promotional offer
  // and should begin playing through those spins.
  common.v1.GiftSpin gift_spin = 2;
}
