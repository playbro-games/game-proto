syntax = "proto3";

package domain.v1;

import "common/v1/event.proto";
import "common/v1/feature_modifier.proto";
import "common/v1/max_win.proto";
import "common/v1/multiplier.proto";
import "common/v1/windata.proto";
import "domain/v1/cascade.proto";

// Freespins contains the complete context of the free spins bonus game,
// providing all information necessary for the frontend to render and display the free spins game session.
// Including remaining spins, multipliers, winning combinations, cascades, and related game events.
message Freespins {
  // round_bet represents the actual bet amount the player wagered for this specific spin.
  // This value is essential for calculating payouts and displaying the bet information to the player.
  int64 round_bet = 1;

  // round_win represents the total monetary winnings from the spin,
  // calculated by multiplying the bet amount by the total multiplier and any applicable bonus multipliers or features.
  int64 round_win = 2;

  // winline contains a list of all winning payline combinations that appeared on the board during this spin.
  // Each entry includes symbol information, positions, occurrence count, and payout amount for that specific winning line.
  repeated common.v1.WinData winline = 3;

  // cascade contains information about cascade or chain reaction mechanics that occurred following this spin.
  // A cascade represents the automatic removal of winning symbols and subsequent symbol drops that can create additional winning combinations and accumulate multipliers.
  repeated domain.v1.Cascade cascade = 4;

  // multipliers contains detailed multiplier mechanics for this spin, if supported.
  // Omit this field when the game does not use multiplier features.
  optional common.v1.Multipliers multipliers = 5;

  // global_multiplier contains a multiplier that can persist or accumulate across a game feature or series of spins.
  // Omit this field when the game does not use a global multiplier mechanic.
  optional common.v1.GlobalMultiplier global_multiplier = 6;

  // bet_per_line is the wager amount per payline.
  // Use it when payout rules are based on line-level betting.
  optional int64 bet_per_line = 7;

  // rounds_left indicates how many free spins remain to be played before the bonus round concludes.
  // When this value reaches zero, the free spins feature is complete and normal gameplay resumes.
  int64 rounds_left = 8;

  // rounds_granted indicates the number of additional free spins that were just awarded to the player in the current response.
  // This value is typically non-zero only when new spins are being granted (e.g., through scatter retriggers) and should be added to the player's total spin count.
  int64 rounds_granted = 9;

  // rounds_total represents the cumulative total number of free spins that have been played so far during this free spins session,
  // allowing the frontend to track progress through the bonus round.
  int64 rounds_total = 10;

  // total_win represents the cumulative total winnings from all free spins played so far in the current session, allowing the player to see their total winnings from the free spins bonus at a glance.
  int64 total_win = 11;

  // events contains all the information about the unique game events of a particular game that affect the user's gameplay.
  repeated common.v1.Event events = 12;

  // feature_modifiers contains feature-level rules that remain active across the free spins session.
  // Use this block when a feature selects or changes rules for future free spin wins, symbols, positions, or global feature state.
  repeated common.v1.FeatureModifier feature_modifiers = 13;

  // Represents the event when the maximum win has been reached in the game.
  optional common.v1.MaxWin max_win = 14;
}
