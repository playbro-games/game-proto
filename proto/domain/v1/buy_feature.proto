syntax = "proto3";

package domain.v1;

import "common/v1/orthogonal_position.proto";

// BuyFeatureData represents the data structure for a buy feature in a game. It includes optional fields for the name of the buy feature, a list of unlocked cells on the game board, and the type of buy feature. The type of buy feature can be one of several predefined types, such as Standard Buy, Super Buy, or Mystery Buy, each with its own characteristics and effects on gameplay.
message BuyFeatureData {
  // name is an optional field that can be used to provide a human-readable identifier for the buy feature, which may be helpful for display purposes in the client interface or for logging and analytics.
  optional string name = 1;

  // unlocked_cells is a list of positions on the game board that have been unlocked as a result of the buy feature purchase.
  repeated common.v1.OrthogonalPosition unlocked_cells = 2;

  // type it may vary in different games depending on the documentation.
  optional BuyFeatureType type = 3;
}

enum BuyFeatureType {
  BUY_FEATURE_TYPE_NO_BUY_UNSPECIFIED = 0;

  // Standard Buy: x100 from bet
  // Guaranteed minimum 4 Scatters, range 4–7.
  // The bonus field starts with closed rows.
  // A “buy spin” is triggered with guaranteed Scatters → winnings/cascades are processed → transition to the bonus.
  BUY_FEATURE_TYPE_STANDARD_BUY = 1;

  // Super Buy: x500 from bet
  // FS: Recommended 25.
  // Potential: “fatter” in multipliers/events (exact parameters are configured).
  BUY_FEATURE_TYPE_SUPER_BUY = 2;

  // Mystery Buy: x200 from bet
  // The player chooses 1 of 3 elements → it results in either Standard or Super (odds determined by the mathematician).
  BUY_FEATURE_TYPE_MYSTERY_BUY = 3;
}
