syntax = "proto3";

package domain.v1;

import "common/v1/event.proto";
import "common/v1/id_list.proto";
import "common/v1/movement.proto";
import "common/v1/position.proto";
import "common/v1/windata.proto";

// Context represents the current state of the game, which may include information about the
// current board layout, active bonuses, or other relevant data needed for the client to properly manage the game session.
message Cascade {
  // symbol ids is a list of symbol identifiers that are part of the cascade, which can be used to determine
  // the symbols involved in the winning combination and calculate payouts accordingly.
  repeated common.v1.IdList reels = 1;

  // cluster is a list of clusters that represent groups of matching symbols on the game board, which can lead to wins.
  // Each cluster contains information about the symbol, the payout amount, the count of symbols in the cluster, and their positions on the board.
  repeated common.v1.WinData clusters = 2;

  // unlocked_cells is a list of positions on the game board that have been unlocked as a result of the cascade.
  // Each position indicates a specific cell that is now available for interaction or further gameplay actions.
  repeated common.v1.Position unlocked_cells = 3;

  // blocked_cells is a list of positions on the game board that have been blocked or locked as a result of the cascade.
  // These cells are temporarily unavailable for future interactions until they are explicitly unlocked or the game state changes.
  repeated common.v1.Position blocked_cells = 4;

  // moved_blocked_cells is used to show the movement of blocked cells on the board, if any.
  // It is a two-dimensional array of integers, where each subarray consists of 4 elements:
  // old column, old row, new column, new row: [old_column, old_row, new_column, new_row].
  repeated common.v1.Movement moved_blocked_cells = 5;

  // random_event contains information about whether a random event has occurred during the cascade.
  // This field holds details about special triggered events that can alter the game board state and affect subsequent gameplay mechanics.
  repeated common.v1.Event events = 6;

  // scatters is a list of scatter symbols that have appeared on the board as a result of the cascade.
  // Each scatter entry contains information about the scatter symbol, the payout amount,
  // the trigger event (such as freespins), and the positions where the scatters are located.
  repeated common.v1.WinData scatters = 7;
}
